<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no" />
    <title data-l10n-id="app_title">Audio Recorder Pro</title>
    <link rel="stylesheet" href="css/Template.css" />
    <link rel="stylesheet" href="css/AudioApp.css" />
    <link rel="resource" type="application/l10n" href="locales/{{locale}}.properties" />
    <script src="js/libs/l10n.js" defer></script>
    <script src="js/AudioApp.js" defer></script>
  </head>
  <body>
    <div id="header" data-l10n-id="app_title">AUDIO RECORDER PRO</div>

    <div id="content">
      <div class="nav-group">
        <button id="record-btn" class="focusable" data-l10n-id="btn_record">RECORD</button>
      </div>

      <div class="info-card">
        <p class="label" data-l10n-id="status_label">Status:</p>
        <p id="status-text" data-l10n-id="status_idle">Ready</p>
      </div>

      <div class="nav-group">
        <button id="play-btn" class="focusable" data-l10n-id="btn_play">PLAY</button>
        <button id="save-btn" class="focusable" data-l10n-id="btn_save">SAVE TO MOBILE</button>
      </div>

      <div class="bottom-spacer"></div>
    </div>

    <audio id="audio-player"></audio>

    <div id="softkey-bar">
      <span id="softkey-lsk"></span>
      <span id="softkey-csk" data-l10n-id="sk_select">SELECT</span>
      <span id="softkey-rsk" data-l10n-id="sk_exit">EXIT</span>
    </div>
  </body>
</html>
