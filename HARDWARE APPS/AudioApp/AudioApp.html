<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no" />
    <title>Audio App</title>
    <link rel="stylesheet" href="css/Template.css" />
    <link rel="stylesheet" href="css/AudioApp.css" />
    <script src="js/libs/l10n.js" defer></script>
    <script src="js/AudioApp.js" defer></script>
  </head>
  <body>
    <div id="header">GRABADORA DE VOZ</div>

    <div id="content">
      <div class="nav-group">
        <button id="record-btn" class="focusable">GRABAR</button>
      </div>

      <div class="info-card">
        <p class="label">Estado:</p>
        <p id="status-text">Listo</p>
      </div>

      <div class="nav-group">
        <button id="play-btn" class="focusable">REPRODUCIR</button>
        <button id="save-btn" class="focusable">GUARDAR EN MÓVIL</button>
      </div>

      <div class="bottom-spacer"></div>
    </div>

    <audio id="audio-player"></audio>

    <div id="softkey-bar">
      <span id="softkey-lsk"></span>
      <span id="softkey-csk">SELECT</span>
      <span id="softkey-rsk">SALIR</span>
    </div>
  </body>
</html>
