<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no" />
    <title data-l10n-id="app_title">Audio App</title>
    <link rel="stylesheet" href="css/Template.css" />
    <link rel="stylesheet" href="css/AudioApp.css" />
    <script src="js/libs/l10n.js" defer></script>
    <script src="js/AudioApp.js" defer></script>
  </head>
  <body>
    <div id="header" data-l10n-id="app_title">GRABADORA DE VOZ</div>

    <div id="content">
      <div class="nav-group">
        <button id="record-btn" class="focusable" data-l10n-id="btn_record">
          GRABAR
        </button>
      </div>

      <div class="info-card" id="status-card">
        <p class="label" data-l10n-id="status_label">Estado:</p>
        <p id="status-text" data-l10n-id="status_idle">Listo para grabar</p>
      </div>

      <div class="nav-group">
        <button id="play-btn" class="focusable" data-l10n-id="btn_play">
          REPRODUCIR ÚLTIMA
        </button>
      </div>

      <div class="bottom-spacer"></div>
    </div>

    <audio id="audio-player"></audio>

    <div id="softkey-bar">
      <span id="softkey-lsk"></span>
      <span id="softkey-csk" data-l10n-id="sk_select">SELECT</span>
      <span id="softkey-rsk" data-l10n-id="sk_exit">SALIR</span>
    </div>
  </body>
</html>
