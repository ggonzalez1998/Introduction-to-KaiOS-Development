<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>App: Navigation</title>
    <meta name="viewport" content="width=device-width, user-scalable=no" />
    <link rel="stylesheet" type="text/css" href="..\..\Template\Template.css" />
    <link rel="stylesheet" type="text/css" href="KeyBoardApp.css" />
  </head>
  <body>
    <div id="header">App: Navigation</div>

    <div id="content">
      <p>Use the D-Pad to navigate</p>

      <ul id="vertical-list" class="nav-group">
        <li class="focusable" tabindex="0">Option 1</li>
        <li class="focusable" tabindex="0">Option 2</li>
        <li class="focusable" tabindex="0">Option 3</li>
        <li class="focusable" tabindex="0">Option 4</li>
      </ul>

      <div id="horizontal-list" class="nav-group">
        <div class="focusable" tabindex="0">OK</div>
        <div class="focusable" tabindex="0">Edit</div>
        <div class="focusable" tabindex="0">Delete</div>
      </div>
    </div>

    <div id="softkey-bar">
      <span id="softkey-lsk"></span>
      <span id="softkey-csk">SELECT</span>
      <span id="softkey-rsk">Back</span>
    </div>

    <script src="KeyBoardApp.js"></script>
  </body>
</html>
