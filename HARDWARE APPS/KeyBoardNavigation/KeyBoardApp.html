<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no" />
    <title>Guía Navegación</title>
    <link rel="stylesheet" href="css/Template.css" />
    <link rel="stylesheet" href="css/KeyBoardApp.css" />
    <script src="js/libs/l10n.js" defer></script>
    <script src="js/KeyBoardApp.js" defer></script>
  </head>
  <body>
    <div id="header">Guía Navegación</div>

    <div id="content">
      <p id="main-title">Selecciona una opción:</p>

      <ul id="vertical-list" class="nav-group">
        <li class="focusable" tabindex="0">Opción 1</li>
        <li class="focusable" tabindex="0">Opción 2</li>
        <li class="focusable" tabindex="0">Opción 3</li>
      </ul>

      <div id="input-container" class="nav-group">
        <input
          type="text"
          id="main-input"
          class="focusable"
          placeholder="Escribe aquí..."
        />
        <button id="alert-btn" class="focusable">ENVIAR MENSAJE</button>
      </div>
    </div>

    <div id="softkey-bar">
      <span id="softkey-lsk"></span>
      <span id="softkey-csk">SELECT</span>
      <span id="softkey-rsk">SALIR</span>
    </div>
  </body>
</html>
