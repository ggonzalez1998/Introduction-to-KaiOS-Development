<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no" />
    <title>Guide Navigation</title>
    <link rel="stylesheet" href="css/Template.css" />
    <link rel="stylesheet" href="css/KeyBoardApp.css" />
    <link rel="resource" type="application/l10n" href="data/locales.ini" />
    <script src="js/libs/l10n.js" defer></script>
    <script src="js/KeyBoardApp.js" defer></script>
  </head>
  <body>
    <div id="header" data-l10n-id="app_title">GUIDE NAVIGATION</div>

    <div id="content">
      <p id="main-title" data-l10n-id="instructions">Select an option:</p>

      <ul id="vertical-list">
        <li class="focusable" tabindex="0" data-l10n-id="opt_1">Option 1</li>
        <li class="focusable" tabindex="0" data-l10n-id="opt_2">Option 2</li>
        <li class="focusable" tabindex="0" data-l10n-id="opt_3">Option 3</li>
      </ul>

      <div id="input-container">
        <input
          type="text"
          id="main-input"
          class="focusable"
          placeholder="Write here..."
          data-l10n-id="input_ph"
        />
        <button id="alert-btn" class="focusable" data-l10n-id="btn_show">Show Alert</button>
      </div>

      <div class="bottom-spacer"></div>
    </div>

    <div id="softkey-bar">
      <span id="softkey-lsk"></span>
      <span id="softkey-csk" data-l10n-id="sk_select">SELECT</span>
      <span id="softkey-rsk" data-l10n-id="sk_back">BACK</span>
    </div>
  </body>
</html>
