<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>App: Camera</title>
    <meta name="viewport" content="width=device-width, user-scalable=no" />
    <link rel="stylesheet" type="text/css" href="..\..\Template\Template.css" />
    <link rel="stylesheet" type="text/css" href="CameraApp.css" />
  </head>
  <body>
    <div id="header">App: Camera</div>

    <div id="content">
      <div id="image-placeholder" class="focusable focus">
        Press [ENTER] to take a photo
      </div>

      <img id="image-preview" src="" alt="Photo preview" class="focusable" />
    </div>

    <div id="softkey-bar">
      <span id="softkey-lsk"></span>
      <span id="softkey-csk">Take Photo</span>
      <span id="softkey-rsk">Back</span>
    </div>

    <script src="CameraApp.js"></script>
  </body>
</html>
