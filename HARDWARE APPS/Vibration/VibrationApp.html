<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>App: Vibration</title>
    <meta name="viewport" content="width=device-width, user-scalable=no" />
    <link rel="stylesheet" type="text/css" href="..\..\Template\Template.css" />
    <link rel="stylesheet" type="text/css" href="VibrationApp.css" />
  </head>
  <body>
    <div id="header">App: Vibration</div>

    <div id="content">
      <p>Press the keys to test the vibration motor:</p>

      <p class="key">[ENTER / CSK]</p>
      <p>Simple Vibrate (200ms)</p>

      <p class="key">[ArrowUp]</p>
      <p>Long Vibrate (1000ms)</p>

      <p class="key">[ArrowDown]</p>
      <p>Pattern Vibrate (S.O.S)</p>
    </div>

    <div id="softkey-bar">
      <span id="softkey-lsk">Stop</span>
      <span id="softkey-csk">Test</span>
      <span id="softkey-rsk">Back</span>
    </div>

    <script src="VibrationApp.js"></script>
  </body>
</html>
